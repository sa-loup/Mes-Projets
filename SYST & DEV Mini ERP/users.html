<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Utilisateurs - IT Services Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="main-container">
        <!-- Sidebar (Simplified for now) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-code"></i> <span>IT Services Pro</span></div>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span></a>
                <a href="#" class="menu-item active"><i class="fas fa-user-shield"></i> <span>Utilisateurs</span></a>
                <div class="menu-divider"></div>
                <a href="dashboard.html" class="menu-item"><i class="fas fa-arrow-left"></i> <span>Retour</span></a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="header">
                <div class="breadcrumb"><span>Configuration</span> / <span>Utilisateurs</span></div>
            </header>

            <div class="page-header">
                <div>
                    <h1 class="page-title">Utilisateurs Système</h1>
                    <p class="page-subtitle">Gérez les accès Admin et Utilisateurs</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Ajouter un compte</h3>
                </div>
                <div class="card-body">
                    <form id="userForm" class="form-grid">
                        <div class="form-group">
                            <label>Nom complet</label>
                            <input type="text" id="userFullName" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="userEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="userPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Rôle</label>
                            <select id="userRole">
                                <option value="user">Utilisateur</option>
                                <option value="admin">Administrateur</option>
                            </select>
                        </div>
                        <div class="form-actions" style="grid-column: span 2;">
                            <button type="submit" class="btn btn-primary">Créer le compte</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/google-sheets.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isAdmin()) {
                alert('Accès réservé aux administrateurs');
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('userForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const userData = {
                    id: Utils.generateId(),
                    full_name: document.getElementById('userFullName').value,
                    email: document.getElementById('userEmail').value,
                    password_hash: auth.simpleHash(document.getElementById('userPassword').value),
                    role: document.getElementById('userRole').value,
                    created_at: new Date().toISOString(),
                    last_login: ''
                };

                try {
                    await sheetsAPI.saveData('Users', userData, false);
                    Utils.showToast('Compte créé avec succès', 'success');
                    e.target.reset();
                } catch (error) {
                    console.error('Erreur création utilisateur:', error);
                    Utils.showToast('Erreur lors de la création', 'error');
                }
            });
        });
    </script>
</body>

</html>
