<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Battle - Naruto Edition</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/battle.png">
    <link rel="shortcut icon" href="/battle.png" type="image/x-icon">

    <style>

 * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #000;
        }

        /* Écran d'accueil */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0c1445 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        #intro-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Particules animées */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff6b00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff6b00;
            animation: float 15s infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Logo principal */
        .logo-container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: logoEntrance 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes logoEntrance {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .main-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            background: linear-gradient(90deg, #ff6b00, #ffd700, #ff6b00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px rgba(255, 107, 0, 0.5);
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.7));
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .subtitle {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #ffd700;
            font-style: italic;
            margin-bottom: 50px;
            animation: pulse 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.8;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* Bouton de démarrage */
        .start-button {
            position: relative;
            padding: 20px 60px;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            background: linear-gradient(135deg, #ff6b00, #ff8c00);
            border: 3px solid #ffd700;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 0 10px 40px rgba(255, 107, 0, 0.6),
                        inset 0 -3px 10px rgba(0, 0, 0, 0.3);
            animation: buttonPulse 2s ease-in-out infinite;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .start-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .start-button:hover::before {
            width: 400px;
            height: 400px;
        }

        .start-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 107, 0, 0.8),
                        inset 0 -3px 10px rgba(0, 0, 0, 0.3);
        }

        .start-button:active {
            transform: translateY(-2px) scale(1.02);
        }

        @keyframes buttonPulse {
            0%, 100% {
                box-shadow: 0 10px 40px rgba(255, 107, 0, 0.6),
                            inset 0 -3px 10px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 15px 50px rgba(255, 107, 0, 0.9),
                            0 0 30px rgba(255, 215, 0, 0.5),
                            inset 0 -3px 10px rgba(0, 0, 0, 0.3);
            }
        }

        /* Cercles d'énergie */
        .energy-circle {
            position: absolute;
            border: 2px solid rgba(255, 107, 0, 0.3);
            border-radius: 50%;
            animation: expand 4s ease-out infinite;
        }

        .energy-circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .energy-circle:nth-child(2) {
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1s;
        }

        .energy-circle:nth-child(3) {
            width: 700px;
            height: 700px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 2s;
        }

        @keyframes expand {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }

        /* Symboles Naruto */
        .naruto-symbol {
            position: absolute;
            font-size: 60px;
            opacity: 0.2;
            animation: rotate 20s linear infinite;
        }

        .naruto-symbol:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .naruto-symbol:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 5s;
        }

        .naruto-symbol:nth-child(3) {
            bottom: 15%;
            left: 15%;
            animation-delay: 10s;
        }

        .naruto-symbol:nth-child(4) {
            bottom: 20%;
            right: 10%;
            animation-delay: 15s;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Écran de jeu (caché au départ) */
       

        /* Animation de chargement */
        .loading-text {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 1.2rem;
            opacity: 0;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
    
      :root {
        --primary: #0f3460;
        --secondary: #e94560;
        --accent: #4cc9f0;
        --dark: #1a1a2e;
        --darker: #16213e;
        --light: #f1f1f1;
        --player: #ff6b00;
        --ai: #8a2be2;
        --success: #4ade80;
        --warning: #f59e0b;
        --naruto-orange: #ff6b00;
        --sasuke-blue: #2e5cb8;
        --kakashi-silver: #a0a0a0;
        --akatsuki-red: #c41e3a;
      }
    
      body {
        
        /* background: linear-gradient(135deg, #0c1445 0%, #1a1a2e 100%); */
        color: var(--light);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: clamp(10px, 2vw, 20px);
        background-image: url('https://e0.pxfuel.com/wallpapers/786/91/desktop-wallpaper-get-naruto-theme-for-ipod-iphone-epic-naruto.jpg');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        position: relative;
        overflow-x: hidden;
      }
    
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(12, 20, 69, 0.4);
        z-index: -1;
      }
    
      .game-container {
        width: 100%;
        max-width: 1400px;
        display: flex;
        flex-direction: column;
        gap: clamp(12px, 2vw, 20px);
        background: rgba(15, 52, 96, 0.92);
        border-radius: clamp(15px, 2vw, 25px);
        padding: clamp(15px, 3vw, 30px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border: 2px solid var(--naruto-orange);
        animation: fadeIn 0.6s ease-out;
      }
    
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
    
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    
      header {
        text-align: center;
        margin-bottom: clamp(10px, 2vw, 15px);
        padding: clamp(10px, 2vw, 15px);
        background: rgba(0, 0, 0, 0.6);
        border-radius: clamp(12px, 2vw, 18px);
        border: 2px solid var(--naruto-orange);
        box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        position: relative;
        overflow: hidden;
      }
    
      header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255, 107, 0, 0.1) 0%, transparent 70%);
        animation: headerGlow 3s ease-in-out infinite;
      }
    
      @keyframes headerGlow {
    
        0%,
        100% {
          transform: translate(0, 0);
        }
    
        50% {
          transform: translate(10px, 10px);
        }
      }
    
      h1 {
        font-size: clamp(1.8rem, 5vw, 3.2rem);
        margin-bottom: clamp(5px, 1vw, 10px);
        background: linear-gradient(90deg, var(--naruto-orange), #ffd700, var(--naruto-orange));
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 900;
        letter-spacing: 2px;
        position: relative;
        animation: gradientShift 3s ease infinite;
        text-transform: uppercase;
      }
    
      @keyframes gradientShift {
    
        0%,
        100% {
          background-position: 0% 50%;
        }
    
        50% {
          background-position: 100% 50%;
        }
      }
    
      .subtitle {
        font-size: clamp(0.9rem, 2vw, 1.3rem);
        color: #ffd700;
        font-style: italic;
        text-shadow: 0 2px 8px rgba(255, 215, 0, 0.5);
        position: relative;
      }
    
      .game-info {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: clamp(10px, 2vw, 15px);
        background: rgba(0, 0, 0, 0.75);
        border-radius: clamp(12px, 2vw, 18px);
        padding: clamp(12px, 2vw, 20px);
        margin-bottom: clamp(8px, 1.5vw, 12px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        border: 1px solid var(--sasuke-blue);
      }
    
      .info-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        padding: clamp(8px, 1.5vw, 12px);
        background: rgba(46, 92, 184, 0.1);
        border-radius: 10px;
        transition: all 0.3s ease;
      }
    
      .info-item:hover {
        background: rgba(46, 92, 184, 0.2);
        transform: translateY(-2px);
      }
    
      .info-label {
        font-size: clamp(0.75rem, 1.5vw, 0.95rem);
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
      }
    
      .info-value {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        font-weight: 900;
        color: var(--light);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }
    
      .zones-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: clamp(12px, 2vw, 20px);
        margin-bottom: clamp(12px, 2vw, 20px);
      }
    
      .zone {
        min-height: clamp(200px, 30vw, 240px);
        background-size: cover;
        background-position: center;
        border-radius: clamp(12px, 2vw, 18px);
        padding: clamp(12px, 2vw, 18px);
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 2px solid transparent;
        position: relative;
        overflow: hidden;
      }
    
      .zone::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.65);
        transition: background 0.4s ease;
        z-index: 1;
      }
    
      .zone::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, transparent, rgba(255, 107, 0, 0.1));
        opacity: 0;
        transition: opacity 0.4s ease;
        z-index: 1;
      }
    
      .zone>* {
        position: relative;
        z-index: 2;
      }
    
      .zone:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: var(--naruto-orange);
        box-shadow: 0 15px 40px rgba(255, 107, 0, 0.4);
      }
    
      .zone:hover::before {
        background: rgba(0, 0, 0, 0.5);
      }
    
      .zone:hover::after {
        opacity: 1;
      }
    
      .zone-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: clamp(10px, 2vw, 15px);
        padding-bottom: clamp(8px, 1.5vw, 12px);
        border-bottom: 2px solid rgba(255, 215, 0, 0.4);
        flex-wrap: wrap;
        gap: 8px;
      }
    
      .zone-name {
        font-weight: 900;
        color: #ffd700;
        font-size: clamp(1rem, 2vw, 1.4rem);
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    
      .zone-effect {
        font-size: clamp(0.7rem, 1.5vw, 0.85rem);
        color: var(--light);
        background: rgba(233, 69, 96, 0.7);
        padding: clamp(4px, 1vw, 6px) clamp(8px, 1.5vw, 12px);
        border-radius: 20px;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(233, 69, 96, 0.4);
      }
    
      .zone-power {
        display: flex;
        justify-content: space-between;
        margin-top: auto;
        font-size: clamp(0.85rem, 1.8vw, 1.05rem);
        font-weight: 900;
        gap: 10px;
      }
    
      .player-power {
        color: var(--player);
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        background: rgba(255, 107, 0, 0.2);
        padding: 5px 10px;
        border-radius: 8px;
      }
    
      .ai-power {
        color: var(--ai);
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        background: rgba(138, 43, 226, 0.2);
        padding: 5px 10px;
        border-radius: 8px;
      }
    
      .zone-cards {
        display: flex;
        flex-wrap: wrap;
        gap: clamp(8px, 1.5vw, 12px);
        flex-grow: 1;
        min-height: clamp(100px, 20vw, 140px);
        justify-content: center;
        align-items: flex-start;
      }
    
      .hand-container {
        display: flex;
        justify-content: center;
        gap: clamp(10px, 2vw, 18px);
        padding: clamp(15px, 3vw, 25px);
        background: rgba(0, 0, 0, 0.75);
        border-radius: clamp(12px, 2vw, 18px);
        box-shadow: 0 -6px 20px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        border: 2px solid var(--naruto-orange);
        flex-wrap: wrap;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--naruto-orange) rgba(0, 0, 0, 0.3);
      }
    
      .hand-container::-webkit-scrollbar {
        height: 8px;
      }
    
      .hand-container::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
      }
    
      .hand-container::-webkit-scrollbar-thumb {
        background: var(--naruto-orange);
        border-radius: 10px;
      }
    
      .card {
        width: clamp(110px, 15vw, 150px);
        height: clamp(150px, 21vw, 200px);
        background-size: cover;
        background-position: center;
        border-radius: clamp(10px, 1.5vw, 15px);
        padding: clamp(10px, 1.5vw, 14px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: grab;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
        border: 3px solid var(--naruto-orange);
        flex-shrink: 0;
      }
    
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.55);
        transition: background 0.3s ease;
        z-index: 1;
      }
    
      .card>* {
        position: relative;
        z-index: 2;
      }
    
      .card:hover {
        transform: translateY(-15px) scale(1.08);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      }
    
      .card:hover::before {
        background: rgba(0, 0, 0, 0.4);
      }
    
      .card:active {
        cursor: grabbing;
        transform: translateY(-10px) scale(1.05);
      }
    
      .card.player-card {
        border-color: var(--player);
        box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
      }
    
      .card.ai-card {
        border-color: var(--ai);
        box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4);
      }
    
      .card-cost {
        position: absolute;
        top: clamp(6px, 1vw, 10px);
        left: clamp(6px, 1vw, 10px);
        background: linear-gradient(135deg, var(--naruto-orange), #ff8c00);
        width: clamp(26px, 4vw, 32px);
        height: clamp(26px, 4vw, 32px);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: clamp(0.85rem, 1.5vw, 1rem);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.3);
        z-index: 3;
      }
    
      .card-power {
        position: absolute;
        bottom: clamp(6px, 1vw, 10px);
        right: clamp(6px, 1vw, 10px);
        background: linear-gradient(135deg, var(--sasuke-blue), #4a7ddb);
        width: clamp(26px, 4vw, 32px);
        height: clamp(26px, 4vw, 32px);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: clamp(0.85rem, 1.5vw, 1rem);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.3);
        z-index: 3;
      }
    
      .card-name {
        text-align: center;
        font-weight: 900;
        margin-top: clamp(28px, 5vw, 36px);
        font-size: clamp(0.85rem, 1.8vw, 1.1rem);
        color: white;
        text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9);
        letter-spacing: 0.5px;
        line-height: 1.2;
      }
    
      .card-effect {
        font-size: clamp(0.65rem, 1.2vw, 0.75rem);
        text-align: center;
        margin-top: clamp(6px, 1.5vw, 10px);
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        background: rgba(0, 0, 0, 0.6);
        padding: clamp(4px, 0.8vw, 6px);
        border-radius: 6px;
        line-height: 1.3;
      }
    
      .controls {
        display: flex;
        justify-content: center;
        gap: clamp(12px, 2vw, 20px);
        margin-top: clamp(8px, 1.5vw, 12px);
        flex-wrap: wrap;
      }
    
      button {
        padding: clamp(10px, 2vw, 14px) clamp(20px, 4vw, 30px);
        background: linear-gradient(135deg, var(--naruto-orange), #ff8c00);
        border: none;
        border-radius: 50px;
        color: white;
        font-weight: 900;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 6px 15px rgba(255, 107, 0, 0.4);
        font-size: clamp(0.9rem, 1.8vw, 1.1rem);
        letter-spacing: 1px;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
      }
    
      button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }
    
      button:hover::before {

      @keyframes modalFadeIn {
        from {
          opacity: 0;
        }
    
        to {
          opacity: 1;
        }
      }
    
      .modal-content {
        background: linear-gradient(135deg, #0c1445 0%, #1a1a2e 100%);

        text-align: center;
        max-width: 600px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        border: 3px solid var(--naruto-orange);
        animation: modalSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
    
      @keyframes modalSlideIn {
        from {
          transform: translateY(-50px) scale(0.9);
          opacity: 0;
        }
    
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
    
      .modal h2 {
        font-size: clamp(2rem, 5vw, 3rem);
        margin-bottom: clamp(15px, 3vw, 25px);
        background: linear-gradient(90deg, var(--naruto-orange), #ffd700);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 900;
        text-transform: uppercase;
      }

        font-size: clamp(1rem, 2vw, 1.3rem);
        color: white;
        line-height: 1.6;
      }

        width: 100%;
        height: clamp(8px, 1.5vw, 12px);

        border-radius: 20px;
        margin-top: clamp(5px, 1vw, 8px);
        overflow: hidden;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
      }
    
      .energy-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--naruto-orange), #ff8c00, #ffd700);
        background-size: 200% 100%;
        border-radius: 20px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 15px rgba(255, 107, 0, 0.6);
        animation: energyGlow 2s ease-in-out infinite;
      }
    
      @keyframes energyGlow {
    
        0%,
        100% {
          background-position: 0% 50%;
          box-shadow: 0 0 15px rgba(255, 107, 0, 0.6);

          background-position: 100% 50%;
          box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
        }
      }

        0% {

        100% {

          opacity: 1;
        }
      }
    
      .card-draw {
        animation: cardDraw 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
    
      @keyframes pulse {
    
        0%,
        100% {
          transform: scale(1);
        }
    
        50% {

      /* Responsive pour mobiles */
      @media (max-width: 768px) {

          padding: 10px;
          background-attachment: scroll;

// Fonction pour obtenir la description détaillée de l'effet
 function getEffectDescription(effect) {
            if (!effect) return 'No special effect';
            
            switch(effect.type) {
                case 'zone-boost':
                    const zoneName = effect.zone === 'zone-1' ? 'Konoha' : 
                                    effect.zone === 'zone-2' ? 'Suna' : 
                                    effect.zone === 'zone-3' ? 'Kiri' : 'Unknown zone';
                    return `+${effect.value} power in ${zoneName}`;
                
                case 'on-play':
                    if (effect.value === '+1-energy') return '+1 Chakra';
                    if (effect.value === '+1-power-all') return '+1 to all your cards';
                    return effect.value;
                
                case 'destroy':
                    if (effect.target === 'highest-power') return 'Destroys the highest power enemy card';
                    if (effect.target === 'all') return 'Destroys all enemy cards';
                    return 'Destroys an enemy card';
                case 'rage-mode':
                    return `+${effect.value} power for 2 turns`;
                    
                case 'draw-card':
                    return 'Draw an additional card';
                
                case 'shield':
                    return `${effect.value} point shield`;
                
                case 'copy-effect':
                    return 'Copies the effect of the last played card';
                
                case 'revive':
                    return 'Brings a destroyed card back to your hand';

                case 'double-attack':
                    return 'This card can attack twice this turn';

                     case 'attack':
            return 'This card can attack this turn';
                
                case 'stun-opponent':
                    return 'Stuns the opponent for one turn';
                
                case 'chakra-drain':
                    return `Reduces opponent's Chakra by ${effect.value}`;
                
                case 'heal':
                    return `Heals ${effect.value} power point(s) to your cards`;
                
                case 'explosion':
                    return `Deals ${effect.value} damage to all enemy cards`;
                
                case 'poison':
                    return `Weakens an enemy card by ${effect.value} per turn`;
                
                case 'immortality':
                    return 'Cannot be destroyed for 1 turn';
                
                case 'grow-forest':
                    return `Strengthens Konoha cards by ${effect.value} power`;
                default:
                    return 'Unique special effect';
            }
        }

    // Effacer la sélection des zones
    function clearZoneSelection() {
      for (let i = 0; i < 3; i++) {
        const zoneElement = document.getElementById(`zone-${i+1}`);
        zoneElement.style.border = '';
        zoneElement.style.cursor = '';

    // Jouer une carte
    function playCard(card, zoneIndex) {
      if (card.cost > gameState.playerEnergy) {
        alert("Pas assez de chakra pour jouer cette carte !");
        return;
      }
      
      // Retirer la carte de la main
      const cardIndex = gameState.playerHand.findIndex(c => c.id === card.id);
      if (cardIndex !== -1) {
        gameState.playerHand.splice(cardIndex, 1);
        
        // Ajouter la carte à la zone
        gameState.playedCards.player[zoneIndex].push(card);
        
        // Dépenser l'énergie
        gameState.playerEnergy -= card.cost;
        
        // Appliquer les effets de la carte
        applyCardEffect(card, zoneIndex, 'player');
        
        // Appliquer l'effet de zone
        applyZoneEffect(zoneIndex, 'player', card);
        
        // Recalculer les puissances des zones
        calculateZonePowers();
        
        // Vérifier si le jeu est terminé
        checkGameEnd();
        
        // Réinitialiser la sélection
        gameState.selectedCard = null;
        clearZoneSelection();
        
        // Mettre à jour l'interface
        updateUI();
        
        // L'IA joue après le joueur (sauf si elle est étourdie)
        if (!gameState.aiStunned) {
          setTimeout(playAITurn, 1500);
        } else {
          gameState.aiStunned = false;
        }
      }
    }



    // Appliquer l'effet d'une carte
    function applyCardEffect(card, zoneIndex, player) {
  if (!card.effect) return;
  
  const isPlayer = player === 'player';
  const opponent = isPlayer ? 'opponent' : 'player';
  
  switch(card.effect.type) {
    case 'on-play':
      if (card.effect.value === '+1-energy') {
        if (isPlayer) {
          gameState.playerEnergy += 1;
        }
      } else if (card.effect.value === '+1-power-all') {
        // +1 à toutes les cartes du joueur dans toutes les zones
        for (let i = 0; i < 3; i++) {
          gameState.playedCards.player[i].forEach(c => {
            c.power += 1;
          });
        }
      }
      break;
      
    case 'draw-card':
      if (isPlayer && gameState.playerDeck.length > 0) {
        gameState.playerHand.push(gameState.playerDeck.pop());
      } else if (!isPlayer && gameState.opponentDeck.length > 0) {
        gameState.opponentHand.push(gameState.opponentDeck.pop());
      }
      break;
      
    case 'destroy':
      if (card.effect.target === 'highest-power') {
        destroyHighestPowerCard(opponent);
      } else if (card.effect.target === 'all') {
        // Détruire toutes les cartes de l'adversaire
        for (let i = 0; i < 3; i++) {
          gameState.playedCards[opponent][i] = [];
        }
      }
      break;
      
    case 'stun-opponent':
      gameState.aiStunned = true;
      break;

    case 'chakra-drain':
      // Réduit l'énergie de l'adversaire
      if (isPlayer) {
        gameState.playerEnergy = Math.max(0, gameState.playerEnergy - card.effect.value);
      } else {
        // Pour l'IA, on simule une réduction d'énergie
        // (l'IA n'a pas de variable d'énergie séparée dans votre code actuel)
      }
      break;
      
    case 'heal':
      // Soigne toutes vos cartes
      for (let i = 0; i < 3; i++) {
        gameState.playedCards[player][i].forEach(c => {
          c.power += card.effect.value;
        });
      }
      break;
      
    case 'explosion':
      // Inflige des dégâts à toutes les cartes adverses
      for (let i = 0; i < 3; i++) {
        gameState.playedCards[opponent][i].forEach(c => {
          c.power = Math.max(0, c.power - card.effect.value);
        });
      }
      break;
      
    case 'double-attack':
      // La carte attaque deux fois (double sa puissance pour ce tour)
      card.power *= 2;
      break;

      case 'attack':
      // La carte attaque une fois (sa puissance pour ce tour)
      card.power *= 1;
      break;
      
    case 'rage-mode':
      // Augmente la puissance de la carte
      card.power += card.effect.value;
      break;
      
    case 'poison':
      // Réduit la puissance de toutes les cartes adverses
      for (let i = 0; i < 3; i++) {
        gameState.playedCards[opponent][i].forEach(c => {
          c.power = Math.max(0, c.power - card.effect.value);
        });
      }
      break;
      
    case 'immortality':
      // La carte ne peut pas être détruite ce tour
      card.immortal = true;
      setTimeout(() => {
        card.immortal = false;
      }, 2000);
      break;
      
    case 'revive':
      // Ramène la dernière carte détruite
      reviveLastCard(player);
      break;
      
    case 'shield':
      // Ajoute un bouclier à toutes vos cartes
      for (let i = 0; i < 3; i++) {
        gameState.playedCards[player][i].forEach(c => {
          if (!c.shield) c.shield = 0;
          c.shield += card.effect.value;
        });
      }
      break;
      
    case 'zone-boost':
      // Applique le boost de zone
      applyZoneBoost(card.effect.zone, card.effect.value, player);
      break;
  }
}


// Détruit la carte la plus puissante de l'adversaire
function destroyHighestPowerCard(opponent) {
  let maxPower = -1;
  let targetZone = -1;
  let targetIndex = -1;
  
  for (let i = 0; i < 3; i++) {
    gameState.playedCards[opponent][i].forEach((c, index) => {
      if (c.power > maxPower && !c.immortal) {
        maxPower = c.power;
        targetZone = i;
        targetIndex = index;
      }
    });
  }
  
  if (targetZone !== -1 && targetIndex !== -1) {
    gameState.playedCards[opponent][targetZone].splice(targetIndex, 1);
  }
}

// Ramène la dernière carte détruite
function reviveLastCard(player) {
  // Implémentation simplifiée - dans un vrai jeu, vous auriez un cimetière
  const deck = player === 'player' ? gameState.playerDeck : gameState.opponentDeck;
  const hand = player === 'player' ? gameState.playerHand : gameState.opponentHand;
  
  if (deck.length > 0) {
    const revivedCard = deck[deck.length - 1];
    hand.push(revivedCard);
    deck.pop();
  }
}

// Applique un boost à une zone spécifique
function applyZoneBoost(zone, value, player) {
  const zoneIndex = parseInt(zone.split('-')[1]) - 1;
  
  if (zoneIndex >= 0 && zoneIndex < 3) {
    gameState.playedCards[player][zoneIndex].forEach(card => {
      card.power += value;
    });
  }
}

    // Appliquer l'effet de zone
    function applyZoneEffect(zoneIndex, player, card) {
      const zone = document.getElementById(`zone-${zoneIndex+1}`);
      const effect = zone.dataset.effect;
      
      if (effect === 'boost-power-1') {
        card.power += 1;
      } else if (effect === 'bonus-energy' && player === 'player') {
        gameState.playerEnergy += 1;
      }
    }

    // Calculer les puissances des zones
    function calculateZonePowers() {
      for (let i = 0; i < 3; i++) {
        // Calculer la puissance du joueur dans la zone
        gameState.zonePowers.player[i] = gameState.playedCards.player[i].reduce((total, card) => total + card.power, 0);
        
        // Calculer la puissance de l'IA dans la zone
        gameState.zonePowers.opponent[i] = gameState.playedCards.opponent[i].reduce((total, card) => total + card.power, 0);
        
        // Déterminer le contrôle de la zone
        if (gameState.zonePowers.player[i] > gameState.zonePowers.opponent[i]) {
          gameState.zoneControl[i] = true;
        } else if (gameState.zonePowers.player[i] < gameState.zonePowers.opponent[i]) {
          gameState.zoneControl[i] = false;
        } else {
          gameState.zoneControl[i] = null;
        }
      }
    }

    // Vérifier si le jeu est terminé
    function checkGameEnd() {
      if (gameState.turn >= gameState.maxTurns) {
        gameState.gameOver = true;
        
        // Compter les zones contrôlées
        const playerZones = gameState.zoneControl.filter(control => control === true).length;
        const opponentZones = gameState.zoneControl.filter(control => control === false).length;
        
        // Déterminer le gagnant
        let result, message;
        if (playerZones >= 2) {
          result = "Victory !";
          message = `Believe it! You controlled ${playerZones} villages out of 3 !`;
          playSound(soundWin);
        } else if (opponentZones >= 2) {
          result = "Defeat !";
          message = `The enemy controlled ${opponentZones} villages out of 3...`;
          playSound(soundLose);
        } else {
          result = "Draw !";
          message = "No shinobi controls 2 villages or more.";
        }
        
        // Afficher le modal de fin de jeu
        document.getElementById('game-result').textContent = result;
        document.getElementById('game-message').textContent = message;
        document.getElementById('game-over-modal').style.display = 'flex';
      }
    }

    // Tour de l'IA
    // Tour de l'IA (version améliorée)
function playAITurn() {
  if (gameState.gameOver || gameState.aiStunned) return;
  
  // L'IA a de l'énergie basée sur le tour
  const aiEnergy = gameState.turn;
  let energyUsed = 0;
  
  // Trier les cartes par valeur (puissance/coût)
  const playableCards = gameState.opponentHand.filter(card => card.cost <= aiEnergy - energyUsed);
  playableCards.sort((a, b) => (b.power / b.cost) - (a.power / b.cost));
  
  // Stratégie de l'IA : prioriser les zones où elle est en retard
  const zonePriorities = getZonePriorities();
  
  // Jouer des cartes si possible
  playableCards.forEach(card => {
    if (energyUsed + card.cost <= aiEnergy) {
      // Choisir une zone selon les priorités
      let zoneIndex = zonePriorities[0];
      
      // Si la carte a un effet de zone, essayer de la jouer dans la zone correspondante
      if (card.effect && card.effect.type === 'zone-boost') {
        const effectZoneIndex = parseInt(card.effect.zone.split('-')[1]) - 1;
        if (effectZoneIndex >= 0 && effectZoneIndex < 3) {
          zoneIndex = effectZoneIndex;
        }
      }
      
      // Retirer la carte de la main
      const cardIndex = gameState.opponentHand.findIndex(c => c.id === card.id);
      if (cardIndex !== -1) {
        gameState.opponentHand.splice(cardIndex, 1);
        
        // Ajouter la carte à la zone
        gameState.playedCards.opponent[zoneIndex].push(card);
        
        // Dépenser l'énergie
        energyUsed += card.cost;
        
        // Appliquer les effets de la carte
        applyCardEffect(card, zoneIndex, 'opponent');
        
        // Jouer le son de la carte IA
        if (card.sound) {
          const voice = new Audio(card.sound);
          voice.volume = 0.7; // Réduire le volume pour l'IA
          voice.play().catch(e => console.log("AI voice play failed:", e));
        }
      }
    }
  });
  
  // Recalculer les puissances des zones
  calculateZonePowers();
  
  // Mettre à jour l'interface
  updateUI();
}

    // Obtenir les priorités de zone pour l'IA
    function getZonePriorities() {
      const priorities = [];
      const powers = [];
      
      for (let i = 0; i < 3; i++) {
        powers.push({
          zone: i,
          diff: gameState.zonePowers.opponent[i] - gameState.zonePowers.player[i]
        });
      }

// Fonction pour piocher une main équilibrée
function drawBalancedHand() {
  gameState.playerHand = [];
  gameState.opponentHand = [];
  
  // Piocher 4 cartes avec au moins 2 cartes de coût 1-2
  let playerLowCostCards = 0;
  let opponentLowCostCards = 0;
  
  for (let i = 0; i < 4; i++) {
    if (gameState.playerDeck.length > 0) {
      const card = gameState.playerDeck.pop();
      gameState.playerHand.push(card);
      if (card.cost <= 2) playerLowCostCards++;
    }
    
    if (gameState.opponentDeck.length > 0) {
      const card = gameState.opponentDeck.pop();
      gameState.opponentHand.push(card);
      if (card.cost <= 2) opponentLowCostCards++;
    }
  }
  
  // Si pas assez de cartes peu coûteuses, repiocher
  if (playerLowCostCards < 2) {
    redistributeHand('player');
  }
  if (opponentLowCostCards < 2) {
    redistributeHand('opponent');
  }
}

// Redistribuer une main pour avoir plus de cartes jouables
function redistributeHand(player) {
  const deck = player === 'player' ? gameState.playerDeck : gameState.opponentDeck;
  const hand = player === 'player' ? gameState.playerHand : gameState.opponentHand;
  
  // Remettre les cartes dans le deck et mélanger
  deck.push(...hand);
  hand.length = 0;
  shuffle(deck);
  
  // Repiocher en priorisant les cartes peu coûteuses
  let lowCostCards = 0;
  for (let i = 0; i < 4 && deck.length > 0; i++) {
    // Chercher une carte de coût 1-2 d'abord
    if (lowCostCards < 2) {
      const lowCostIndex = deck.findIndex(card => card.cost <= 2);
      if (lowCostIndex !== -1) {
        hand.push(deck.splice(lowCostIndex, 1)[0]);
        lowCostCards++;
        continue;
      }
    }
    
    // Sinon prendre n'importe quelle carte
    hand.push(deck.pop());
  }
}

    max-width: 80%;
  `;
  tipElement.textContent = tip;
  tipElement.id = 'turn-tip';
  
  document.body.appendChild(tipElement);
  
  // Supprimer après 3 secondes
  setTimeout(() => {
    if (document.getElementById('turn-tip')) {
      document.body.removeChild(tipElement);
    }
  }, 3000);
}
    </script>
