    <style>

        body.dark .panel-header {

        }

        body.light .panel-header {
            background-color: #f8f8f8;
            border-bottom-color: #e0e0e0;
        }

        #editor {
            flex: 1;
            width: 100%;
        }

        .preview-panel {
            display: flex;
            flex-direction: column;
        }

        #preview {

            border: none;
            background: white;
        }

        .icon {

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 20px;
            font-size: 12px;
            border-top: 1px solid;
            transition: all 0.3s;
        }

        body.dark .status-bar {
            background-color: #007acc;
            border-top-color: #007acc;
            color: white;
        }

        body.light .status-bar {
            background-color: #007acc;

            color: white;

        .notification {
            position: fixed;

            }

            }

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        let editor;
        let currentTheme = 'dark';

        const defaultCode = `<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;

            color: #667eea;
            margin: 0 0 20px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Bienvenue sur KaizenCode</h1>
        <p>Commencez à coder et voyez le résultat en temps réel.</p>
        <button onclick="alert('Bravo! Vous avez cliqué sur le bouton 🎉')">
            Cliquez-moi!
        </button>
    </div>
</body>

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});

require(['vs/editor/editor.main'], function() {
    editor = monaco.editor.create(document.getElementById('editor'), {
        value: defaultCode,
        language: 'html',
        theme: 'vs-dark',
        fontSize: 14,
        minimap: { enabled: true },
        automaticLayout: true,
        wordWrap: 'on',
        lineNumbers: 'on',
        scrollBeyondLastLine: false,
        formatOnPaste: true,
        formatOnType: true,
        suggestOnTriggerCharacters: true,
        tabSize: 2
    });

    // Infos ligne/colonne
    editor.onDidChangeCursorPosition((e) => {
        document.getElementById('line-info').textContent = 
            `Ligne ${e.position.lineNumber}, Colonne ${e.position.column}`;
    });

    // 🔹 Restaurer le code sauvegardé
    const saved = localStorage.getItem('editorCode');
    if (saved) {
        editor.setValue(saved);
        showNotification('Code restauré! 📂');
    }

    // Exécuter une première fois
    runCode();

    // 🔹 Auto-save + Auto-run
    let autoSaveTimeout;
    let autoRunTimeout;

    editor.onDidChangeModelContent(() => {
        const code = editor.getValue();

        // Auto-save après 2s
        clearTimeout(autoSaveTimeout);
        autoSaveTimeout = setTimeout(() => {
            localStorage.setItem('editorCode', code);
            showNotification('Code sauvegardé automatiquement 💾');
        }, 2000);

        // Auto-run après 1s
        clearTimeout(autoRunTimeout);
        autoRunTimeout = setTimeout(() => {
            runCode(); // Exécuter automatiquement
        }, 1000);
    });

    function updateLanguage(lang) {
    const langBox = document.getElementById("lang-detect");
    langBox.textContent = "Langage : " + lang.toUpperCase();
}


    function detectLanguage() {
    const code = editor.getValue();

    let lang = "plaintext"; // par défaut
    if (/<!DOCTYPE html>|<html>/i.test(code)) lang = "html";
    else if (/^\s*#include\b|int\s+main\s*\(/.test(code)) lang = "cpp";
    else if (/^\s*(public\s+class|System\.out\.println)/.test(code)) lang = "java";
    else if (/^\s*def\s+|print\(|import\s+\w+/.test(code)) lang = "python";
    else if (/^\s*function\b|console\.log\(|let\s+|const\s+/.test(code)) lang = "javascript";
    else if (/^\s*SELECT\s+.*FROM/i.test(code)) lang = "sql";
    else if (/^\s*<\?php|echo\s+/.test(code)) lang = "php";

    monaco.editor.setModelLanguage(editor.getModel(), lang);
    updateLanguage(lang); // ✅ affiche dans la toolbar
}


function updateLanguage() {
    const code = editor.getValue();
    const lang = detectLanguage(code);

    const model = editor.getModel();
    if (monaco.editor.getModelLanguage(model) !== lang) {
        monaco.editor.setModelLanguage(model, lang);
        showNotification(`Langage détecté : ${lang} 🔎`);
    }
}

// Appeler la détection à chaque changement
editor.onDidChangeModelContent(() => {
    updateLanguage();
});

});

function runCode() {
    try {
        const code = editor.getValue();
        const preview = document.getElementById('preview');
        preview.srcdoc = code;
        showNotification('Code exécuté ✅');
    } catch (err) {
        showNotification('Erreur d’exécution ❌');
        console.error(err);
    }
}

function saveCode() {
    const code = editor.getValue();
    localStorage.setItem('editorCode', code);
    showNotification('Code sauvegardé! 💾');
}

function clearCode() {
    if (confirm('Voulez-vous vraiment effacer tout le code?')) {
        editor.setValue('');
        document.getElementById('preview').srcdoc = '';
        localStorage.removeItem('editorCode');
        showNotification('Code effacé! 🗑️');
    }
}

function downloadCode() {
    const code = editor.getValue();
    const blob = new Blob([code], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mon-code.html';
    a.click();
    URL.revokeObjectURL(url);
    showNotification('Code téléchargé! 📥');
}

function toggleTheme() {
    const body = document.body;
    if (currentTheme === 'dark') {
        currentTheme = 'light';
        body.className = 'light';
        monaco.editor.setTheme('vs');
    } else {
        currentTheme = 'dark';
        body.className = 'dark';
        monaco.editor.setTheme('vs-dark');
    }
    showNotification(`Thème ${currentTheme === 'dark' ? 'sombre' : 'clair'} activé! 🎨`);
}

function showNotification(message) {
    const notif = document.getElementById('notification');
    notif.textContent = message;
    notif.classList.add('show');
    setTimeout(() => {
        notif.classList.remove('show');
    }, 1500);
}

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveCode();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
    }
});

// Gestion de l'upload de fichier
document.getElementById("fileInput").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const content = e.target.result;
        editor.setValue(content); // Charger dans l'éditeur

        // Détection automatique du langage
        const lang = detectLanguage(content);
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        
        // Afficher le nom du fichier et le langage
        document.getElementById("file-name").textContent = "Fichier : " + file.name;
        document.getElementById("lang-detect").textContent = "Langage : " + lang.toUpperCase();

        showNotification(`Fichier "${file.name}" chargé avec succès 📂`);
    };

    reader.readAsText(file);





    
});


    </script>
</body>
